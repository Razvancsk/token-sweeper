[toolchain]
  anchor_version = "0.30.1"
  solana_version = "1.18.26"

  [features]
  resolution = true
  skip-lint = false

  [programs.mainnet]
  token_sweeper = "5o8wsyECKtCwT72BNQJRxm1U5xDeVL5bD69WGxAFZSKB"

  [registry]
  url = "https://api.apr.dev"

  [provider]
  cluster = "Mainnet"
  wallet = "~/.config/solana/id.json"

  [scripts]
  test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
  